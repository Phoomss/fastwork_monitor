version: '3.8'

services:
  fastwork-monitor:
    build: .
    container_name: fastwork-monitor
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Mount files to save the state on your host machine
      - ./seen_jobs.json:/app/seen_jobs.json
      - ./matched_jobs.json:/app/matched_jobs.json
    env_file:
      - .env
