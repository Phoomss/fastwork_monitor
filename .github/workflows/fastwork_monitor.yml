name: Fastwork Monitor

on:
  schedule:
    # รันบอทตรวจงานใหม่ทุกๆ 5 นาที
    - cron: "*/5 * * * *"
  workflow_dispatch: # เปิดให้กดรันตรวจสอบทันทีแบบ Manual ในแถบ Actions

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write # เพื่อให้ระบบบอทมีสิทธิ์บันทึกและพุชข้อมูลกลับเข้าคลัง GitHub ของคุณได้

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Fastwork Monitor
        run: node fastwork_monitor.js --once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ติดตามประวัติการตรวจสอบ, รายชื่อฟิลเตอร์ และล็อกการทำงาน
          git add seen_jobs.json matched_jobs.json recent_logs.json
          
          # ดำเนินการ Commit และ Push ไปที่ GitHub Pages เฉพาะเมื่อมีความเปลี่ยนแปลงเกิดขึ้น
          if ! git diff --cached --quiet; then
            git commit -m "chore: update jobs history, seen list and recent logs [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes in jobs or logs. Skip committing."
          fi
